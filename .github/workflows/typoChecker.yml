name: Typo Checker
on: [pull_request]

jobs:
  run:
    name: Typo Checker
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - name: Use custom config file
      uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0
      with:
        config: ./.typos.toml
