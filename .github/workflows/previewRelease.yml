name: Preview Release

on:
  pull_request:
    types: [opened, reopened, synchronize]
  pull_request_review:
    types: [submitted]

jobs:
  previewRelease:
    if: ${{ (((github.event_name != 'pull_request_review') && !(startsWith(github.event.pull_request.head.ref, 'merge-release-'))) || (github.event_name == 'pull_request_review') && (startsWith(github.event.pull_request.head.ref, 'merge-release-'))) }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24
      - name: install dependencies
        run: |
          npm install -g corepack@latest
          corepack enable
          corepack prepare
          pnpm install
      - name: Build smarthr-ui
        run: pnpm ui build
      - name: Build charts
        run: pnpm --filter @smarthr/smarthr-ui-charts build
      - run: pnpx pkg-pr-new publish packages/smarthr-ui packages/charts
