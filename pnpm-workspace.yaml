packages:
  - packages/*
  - sandbox/*

minimumReleaseAge: 10080

auditConfig:
  # HINT: Next.jsに関するpatchだが、SCのチェックでしか利用していないためignoreする
  ignoreGhsas:
    - GHSA-h25m-26qc-wcjf
    - GHSA-9g9p-9gw9-jx7f
    - GHSA-5f7q-jpqc-wp7h
    - GHSA-2g4f-4pwh-qvx6 # eslintが依存しているパッケージの脆弱性だが、問題ないらしいのでignoreする https://github.com/eslint/eslint/issues/20508
    - GHSA-7r86-cg39-jmmj # eslintが依存しているパッケージの脆弱性だが、問題ないらしいのでignoreする https://github.com/eslint/eslint/issues/20518
    - GHSA-23c5-xmqv-rm74 # eslintが依存しているパッケージの脆弱性だが、問題ないらしいのでignoreする https://github.com/eslint/eslint/issues/20518
    - GHSA-f886-m6hf-6m8v
    - GHSA-c2c7-rcm5-vvqj # tailwindcssが依存しているパッケージの脆弱性だが、影響はないのでignoreする
    - GHSA-3v7f-55p6-f55p # tailwindcssが依存しているパッケージの脆弱性だが、影響はないのでignoreする
minimumReleaseAgeExclude:
  # Renovate security update: next@15.5.10
  - next@15.5.10
  # Renovate security update: webpack@5.104.1
  - webpack@5.104.1
  # Renovate security update: glob@13.0.1
  - glob@13.0.1
  # Renovate security update: postcss@8.5.10
  - postcss@8.5.10
  - tar@7.5.7
  - tar@7.5.3
  - tar@7.5.8
  - tar@7.5.10
  - tar@7.5.11
  - tar@7.5.4
  - fast-uri@3.1.1
  - fast-uri@3.1.2
  - '@babel/plugin-transform-modules-systemjs@7.29.4'
  - brace-expansion@5.0.6
  - ws@8.20.1
  # Renovate security update: qs@<6.14.1@6.15.2
  - qs@<6.14.1@6.15.2
  # Renovate security update: vitest@4.1.0
  - vitest@4.1.0
allowBuilds:
  '@swc/core': true
  canvas: true
  esbuild: true
  sharp: true
overrides:
  postcss@<8.5.10: ^8.5.10
